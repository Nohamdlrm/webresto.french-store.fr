<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Technique - Statut</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #111827;
            --accent: #2563eb; /* Un bleu "Confiance" */
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f9fafb;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-width: 480px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .status-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
        }

        /* Le petit point qui clignote (très rassurant pour un client) */
        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* Barre de progression subtile */
        .progress-container {
            background: #f3f4f6;
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .progress-bar {
            width: 75%;
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            animation: load 2s ease-out;
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 75%; }
        }

        .date-info {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .date-label { color: #6b7280; }
        .date-value { font-weight: 600; }

        .note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #9ca3af;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-header">
            <span class="dot"></span> Mise à jour système
        </div>
        
        <h1>Maintenance programmée</h1>
        
        <p>
            Nous effectuons actuellement des optimisations sur le serveur pour garantir la stabilité du site. Cette opération est temporaire.
        </p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="date-info">
            <span class="date-label">Rétablissement prévu :</span>
            <span class="date-value">03 Avril 2026</span>
        </div>

        <div class="note">
            Note : Vos données sont en sécurité, aucun impact sur la base de données.
        </div>
    </div>

</body>
</html>
